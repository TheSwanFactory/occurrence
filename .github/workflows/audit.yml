name: Audit

on:
  pull_request:
  push:
    branches:
      - main
      - occurence_theory

jobs:
  audit:
    name: Run audit scripts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Compile Python scripts
        run: uv run python -m py_compile occurrence_theory_audit.py exceptional_algebras_lab.py

      - name: Run Occurrence Theory audit
        run: uv run python occurrence_theory_audit.py

      - name: Run exceptional algebra lab reproduction
        run: uv run python exceptional_algebras_lab.py
