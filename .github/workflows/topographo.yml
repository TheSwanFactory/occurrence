name: topographo

# The library workflow: builds, tests, and releases the reusable `topographo`
# package. It owns build / PyPI publish / API-docs pages. The consumer-side
# audit lives in occurrence.yml.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "topographo/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/topographo.yml"
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "topographo/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/topographo.yml"

permissions:
  contents: read

jobs:
  package:
    name: Build and test topographo
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run package tests
        run: uv run pytest topographo/tests

      - name: Verify importable package API
        run: |
          uv run python - <<'PY'
          from topographo.core import CayleyDicksonAlgebra, verify_gates
          from topographo.ssd import SedenionAlgebra, average_metric_operator
          from topographo.exceptional import Albert

          assert all(result.passed for result in verify_gates())
          assert CayleyDicksonAlgebra(8).dim == 8
          sedenions = SedenionAlgebra()
          assert average_metric_operator(sedenions, sedenions.sample_crack(4)).shape == (16, 16)
          import numpy as np
          assert Albert().det(np.array([2, 3, 5] + [0] * 24, float)) == 30.0
          PY

      - name: Verify isolated package install
        run: |
          uv pip install --target /tmp/topographo-install .
          cd /tmp
          PYTHONPATH=/tmp/topographo-install "${pythonLocation}/bin/python" - <<'PY'
          import topographo
          import topographo.exceptional

          assert hasattr(topographo, "CayleyDicksonAlgebra")
          assert hasattr(topographo.exceptional, "cayley_dickson_table")
          # topographo.exceptional reuses the core table; it carries no copy.
          assert topographo.exceptional.cayley_dickson_table is topographo.cayley_dickson_table
          PY

      - name: Build distribution
        run: uv build

      - name: Build API documentation
        run: |
          uv run pdoc \
            topographo \
            topographo.core \
            topographo.core.algebra \
            topographo.core.cayley_dickson \
            topographo.core.gates \
            topographo.ssd \
            topographo.ssd.channel \
            topographo.ssd.sedenion \
            topographo.exceptional \
            topographo.exceptional.lab \
            -o site

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/project/topographo/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  pages:
    name: Publish API docs
    runs-on: ubuntu-latest
    needs: package
    # The github-pages environment only allows the default branch, so restrict
    # deploys to main. Tag pushes (v*) and branch dispatches build docs but do
    # not deploy them.
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
